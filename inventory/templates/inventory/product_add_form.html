<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dodaj ruch magazynowy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 600px;">
       <h2>
    {% if form.instance.pk %}
        Edycja produktu: {{ form.instance.name }}
    {% else %}
        Dodaj nowy produkt
    {% endif %}
</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    
    <button type="submit" class="btn btn-success">
        {% if form.instance.pk %}
            Zapisz zmiany
        {% else %}
            Dodaj do bazy
        {% endif %}
    </button>
</form>
        
        <a href="{% url 'product_list' %}" class="btn btn-link w-100 mt-2 text-secondary">Anuluj i wróć</a>
    </div>
</body>
</html>
